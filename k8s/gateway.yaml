---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: traefik
spec:
  controllerName: traefik.io/gateway-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: traefik-gateway
  namespace: default
  annotations:
    # Tell external-dns about this gateway
    external-dns.alpha.kubernetes.io/hostname: "*.h3rmt.dev"
spec:
  gatewayClassName: traefik
  listeners:
    - name: web
      protocol: HTTP
      port: 80
      hostname: "*.h3rmt.dev"
    - name: websecure
      protocol: HTTPS
      port: 443
      hostname: "*.h3rmt.dev"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: traefik-tls-cert
---
# This allows HTTPRoutes in default namespace to reference the Gateway
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-gateway-routes
  namespace: default
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: default
  to:
    - group: gateway.networking.k8s.io
      kind: Gateway
