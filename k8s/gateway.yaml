---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: traefik
spec:
  controllerName: traefik.io/gateway-controller

---
# GatewayClass is managed by Traefik Helm chart
# It will be created automatically when gatewayAPI.enabled=true
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: traefik-gateway
  namespace: default
  annotations:
    # ✅ Correct: target annotation on Gateway
    # external-dns.alpha.kubernetes.io/target: "37.187.250.146"
spec: 
  gatewayClassName: traefik
  listeners:
    - name: web
      protocol: HTTP
      port: 8000
      hostname: "*.h3rmt.dev"
    - name: websecure
      protocol: HTTPS
      port: 8443
      hostname: "*.h3rmt.dev"
      tls:
        mode: Terminate
        # Single wildcard certificate covers all *.h3rmt.dev subdomains
        certificateRefs:
          - kind: Secret
            namespace: default
            name: wildcard-h3rmt-dev-tls
---
# This allows HTTPRoutes in default namespace to reference the Gateway
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-gateway-routes
  namespace: default
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: default
  to:
    - group: gateway.networking.k8s.io
      kind: Gateway
