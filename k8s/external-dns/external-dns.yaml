apiVersion: v1
kind: Namespace
metadata:
  name: external-dns

---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-dns
  namespace: external-dns

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: external-dns
  namespace: external-dns
rules:
- apiGroups: [""]
  resources: ["namespaces", "nodes"]
  verbs: ["get","watch","list"]
- apiGroups: ["gateway.networking.k8s.io"]
  resources: ["gateways","httproutes","grpcroutes","tlsroutes","tcproutes","udproutes"]
  verbs: ["get","watch","list"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: external-dns-viewer
  namespace: external-dns
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: external-dns
subjects:
  - kind: ServiceAccount
    name: external-dns
    namespace: external-dns

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
  namespace: external-dns
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: external-dns
  template:
    metadata:
      labels:
        app: external-dns
    spec:
      serviceAccountName: external-dns
      containers:
      - name: external-dns
        image: registry.k8s.io/external-dns/external-dns:v0.20.0
        args:
        - --source=node
        - --source=gateway-httproute
        - --namespace=default
        - --provider=webhook
        - --domain-filter=h3rmt.dev # Will only manage DNS records for this domain
        - --txt-owner-id=k3s-cluster # Unique identifier for this cluster
        - --policy=sync # or 'upsert-only' to only create records, never delete
        - --registry=txt
        - --txt-prefix=reg-%{record_type}-
        - --interval=1m
        - --log-level=debug
      - name: hetzner-webhook
        image: ghcr.io/mconfalonieri/external-dns-hetzner-webhook:latest
        env:
          - name: HETZNER_API_KEY
            valueFrom:
              secretKeyRef:
                name: hetzner-dns-credentials
                key: api-key
          - name: USE_CLOUD_API
            value: "true"
        ports:
          - containerPort: 8080
            name: http
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
