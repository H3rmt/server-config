apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-echo
  namespace: default
  annotations:
    # Tell external-dns to create this DNS record
    external-dns.alpha.kubernetes.io/hostname: echo.h3rmt.dev
    # Point the DNS record to your server
    # external-dns.alpha.kubernetes.io/target: ovh-1.h3rmt.dev
spec:
  parentRefs:
    - kind: Gateway
      name: traefik-gateway
      namespace: default
  hostnames:
    - echo.h3rmt.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: http-echo
          port: 8080
